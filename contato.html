<!DOCTYPE html>

    <title>Contato</title>

<body>

    <!-- MENU -->
    <header>

        <nav>
            <ul>

                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>

    </header>


    <!-- CONTEÚDO -->
    <main class="container">

        <h1>Contato</h1>

        <div class="card">

            <form id="formulario">

                <input
                    type="text"
                    id="nome"
                    placeholder="Digite seu nome"
                >

                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                >

                <textarea
                    id="mensagem"
                    placeholder="Digite sua mensagem"
                ></textarea>

                <button type="submit">
                    Enviar
                </button>

            </form>

        </div>

    </main>


    <!-- FOOTER -->
    <footer>

    </footer>
